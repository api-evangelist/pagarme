description: >-
  FinOps view of Pagar.me processing costs. Pagar.me bills per successfully
  processed transaction via a merchant discount rate (MDR) on card volume plus
  fixed per-PIX and per-boleto fees, with separate fees for receivable
  anticipation and, in marketplaces, split and transfer operations. Cost is
  driven by settled payment volume rather than API call count. Specific
  per-merchant rates are negotiated and not reconciled here.
notes: >-
  Per-transaction rates are merchant-specific; verify against the Pagar.me
  pricing page and merchant dashboard during reconciliation. Anticipation and
  transfer fees are settled separately from gateway MDR.
sources:
- https://pagar.me/precos
- https://docs.pagar.me
