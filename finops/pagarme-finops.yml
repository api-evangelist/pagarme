meters:
- name: card_transaction_volume
  description: Settled credit/debit card volume billed at the negotiated merchant discount rate (MDR).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - payment_method
  - installments
- name: pix_transactions
  description: PIX transactions billed via percentage and/or fixed fee per transaction.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - payment_method
- name: boleto_transactions
  description: Paid boletos billed at a fixed fee per settled boleto.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - payment_method
- name: anticipation_fees
  description: Fees charged when advancing future card receivables (anticipation).
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - recipient
- name: split_and_transfers
  description: Split and transfer (withdrawal) operations for marketplace recipients.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - recipient
principles:
- name: Visibility
  description: Pull Pagar.me dashboard exports and webhook events; reconcile per-charge MDR and fixed fees against settlement.
- name: Allocation
  description: Tag orders/charges with metadata and codes; map to internal cost centers, sellers, or marketplace recipients.
- name: Optimization
  description: Steer customers toward lower-fee methods (PIX) where viable; minimize anticipation use and tune installment offers to control MDR.
- name: Accountability
  description: Assign owners per store/recipient; review settlement vs. fees and chargeback exposure monthly.
maintainers:
