serviceCategory: Payments and Financial Services
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: BRL
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Pagar.me Core API
  ServiceCategory: Payments and Financial Services
  ProviderName: Pagar.me
  PublisherName: Pagar.me
  InvoiceIssuerName: Pagar.me
  BillingCurrency: BRL
  ChargeCategory: Usage
