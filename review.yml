actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists. Pagar.me's only asynchronous
    mechanism is outbound webhooks (HTTP POST callbacks), which are modeled as a
    Webhooks API entry in apis.yml rather than as an AsyncAPI streaming document.
