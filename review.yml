sources:
  - url: https://docs.pagar.me/reference
    type: APIReference
    note: All documented endpoints are HTTPS REST under /core/v5; Basic auth.
  - url: https://docs.pagar.me/reference/criar-pedido-2
    type: APIReference
    note: Order creation confirms base URL https://api.pagar.me/core/v5 and Basic auth.
  - url: https://docs.pagar.me/docs/webhooks
    type: Documentation
    note: Webhooks deliver event notifications via outbound HTTP POST to a merchant URL; not WebSocket.
  - url: https://docs.pagar.me/reference/vis%C3%A3o-geral-sobre-webhooks
    type: APIReference
