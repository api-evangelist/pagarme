aid: pagarme
name: Pagar.me
review:
  question: Does Pagar.me expose a documented public WebSocket or streaming API?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Pagar.me's asynchronous surface is
    server-to-client webhooks (HTTP POST callbacks the merchant must host and
    expose), not a streaming transport the API serves. There is no documented
    WebSocket (ws/wss) or Server-Sent Events (SSE) endpoint, so no in-scope
    streaming surface exists to model under the current AsyncAPI scope.
findings:
  summary: |
    Pagar.me's Core API (v5) is a synchronous REST API over HTTPS at
    https://api.pagar.me/core/v5, authenticated with HTTP Basic auth using the
    account secret key. Asynchronous payment status updates are delivered via
    webhooks: Pagar.me sends HTTP POST notifications to a merchant-configured
    endpoint when events occur (order, charge, subscription, invoice, recipient,
    and transfer lifecycle events). Webhooks are an outbound HTTP callback
    mechanism the merchant receives; they are not a WebSocket or SSE stream the
    API serves to clients. No realtime bidirectional or server-streaming
    endpoint (ws:// or wss://) is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.pagar.me/core/v5
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound HTTP POST event callbacks to a merchant-hosted URL. Not a client-consumable stream.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the Pagar.me API reference.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming endpoint is documented.
