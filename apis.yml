name: Pagar.me
kind: company
description: Pagar.me is a Brazilian payments and payment-gateway provider (part of
  the Stone group) offering a unified REST API for online checkout, recurring billing,
  and marketplace split payments. The Core API (v5) processes orders and charges via
  credit card, PIX, and boleto, manages customers, cards, subscriptions, plans, and
  invoices, and handles marketplace recipients, split, transfers, and anticipations,
  with webhook event notifications.
